<div class="app-container">
  <header class="app-header">
    <div class="header-content">
      <div class="header-text">
        <h1>Gestión de Fondos BTG</h1>
        <p>Inversión en Fondos Patrimoniales y de Inversión</p>
      </div>
      <button class="reset-btn" (click)="resetData()" title="Reiniciar todos los datos">
        🔄 Resetear Datos
      </button>
    </div>
  </header>

  <main class="app-main">
    <div class="content-grid">
      <!-- Balance Summary -->
      <app-balance-summary [balance]="balance()" />
      
      <!-- Fund List -->
      <app-fund-list (fundSelected)="onFundSelected($event)" />
    </div>
  </main>

  <!-- Fund Subscription Modal -->
  <app-fund-subscription 
    [fund]="selectedFund()" 
    [userBalance]="balance().current"
    (close)="closeSubscriptionModal()"
    (subscriptionSuccess)="onSubscriptionSuccess($event)"
  />
</div>
